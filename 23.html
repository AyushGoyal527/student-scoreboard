<!DOCTYPE html>
<html>
<head>
    <title>Smart Event Dashboard</title>

    <style>
        
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(
                270deg,
                #ff6a00,
                #ee0979,
                #00c6ff,
                #00ff88,
                #6a11cb
            );
            background-size: 1000% 1000%;
            animation: gradientMove 10s ease infinite;
            padding: 20px;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            text-align: center;
            color: white;
        }

        .container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: rgb(5, 129, 224);
            padding: 20px;
            border-radius: 10px;
            width: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #6a11cb;
        }

        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 5px;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.8;
        }

        .add-btn {
            background: #28a745;
            color: white;
        }

        .clear-btn {
            background: #dc3545;
            color: white;
        }

        .sample-btn {
            background: #ffc107;
        }

        .event {
            background: #f1f1f1;
            padding: 10px;
            border-left: 5px solid #6a11cb;
            margin-top: 10px;
            border-radius: 5px;
        }

        .delete-btn {
            background: red;
            color: white;
            float: right;
        }

        .dom-box {
            margin-top: 30px;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>🎯 Smart Event Dashboard</h1>

<div class="container">

    
    <div class="card">
        <h2>Add New Event</h2>

        <input type="text" id="title" placeholder="Event Title">

        <input type="date" id="date">

        <select id="category">
            <option>Conference</option>
            <option>Workshop</option>
            <option>Meeting</option>
            <option>Birthday</option>
        </select>

        <textarea id="description" placeholder="Description"></textarea>

        <button class="add-btn" onclick="addEvent()">Add Event</button>
    </div>


    
    <div class="card">
        <h2>My Events</h2>

        <button class="clear-btn" onclick="clearEvents()">Clear All</button>
        <button class="sample-btn" onclick="addSample()">Add Sample</button>

        <div id="eventList"></div>
    </div>

</div>


<div class="dom-box">
    <h2>DOM Manipulation Demo</h2>
    <p id="keyDisplay">Press any key...</p>
</div>


<script>
    
    function addEvent() {

        let title = document.getElementById("title").value;
        let date = document.getElementById("date").value;
        let category = document.getElementById("category").value;
        let description = document.getElementById("description").value;

        if (title === "" || date === "") {
            alert("Please enter title and date!");
            return;
        }

        let eventDiv = document.createElement("div");
        eventDiv.className = "event";

        eventDiv.innerHTML = `
            <strong>${title}</strong> (${category})<br>
            Date: ${date}<br>
            ${description}
            <button class="delete-btn" onclick="this.parentElement.remove()">X</button>
        `;

        document.getElementById("eventList").appendChild(eventDiv);

        
        document.getElementById("title").value = "";
        document.getElementById("date").value = "";
        document.getElementById("description").value = "";
    }

    function clearEvents() {
        document.getElementById("eventList").innerHTML = "";
    }

    function addSample() {
        document.getElementById("title").value = "Tech Conference";
        document.getElementById("date").value = "2026-03-10";
        document.getElementById("category").value = "Conference";
        document.getElementById("description").value = "Annual tech meetup";
        addEvent();
    }

    document.addEventListener("keydown", function(event) {
        document.getElementById("keyDisplay").innerText =
            "You Pressed: " + event.key;
    });

</script>

</body>
</html>
