  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .product-card { transition: all 0.3s ease; }
    .product-card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15); }
    .cart-sidebar { transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); }
    .cart-sidebar.open { transform: translateX(0); }
    .hero-bg { 
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                  url('https://picsum.photos/id/1015/2000/1200') center/cover;

  </style>

<body class="bg-zinc-50">

  <!-- HEADER -->
  <header class="sticky top-0 z-50 bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <i class="fa-solid fa-headphones text-3xl text-red-600"></i>
        <h1 class="text-3xl font-bold tracking-tighter">Sony Store</h1>
      </div>
      <nav class="hidden md:flex gap-8 text-sm font-medium">
        <a href="#" onclick="filterCategory('all')" class="hover:text-red-600">All</a>
        <a href="#" onclick="filterCategory('TV')" class="hover:text-red-600">Televisions</a>
        <a href="#" onclick="filterCategory('MDR')" class="hover:text-red-600">Headphones</a>
        <a href="#" onclick="filterCategory('Lens')" class="hover:text-red-600">Lenses</a>
        <a href="#" onclick="filterCategory('Theater')" class="hover:text-red-600">Home Theater</a>
      </nav>
      <button onclick="toggleCart()" class="relative text-2xl hover:text-red-600">
        <i class="fa-solid fa-shopping-bag"></i>
        <span id="cart-count" class="absolute -top-1 -right-2 bg-red-600 text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center">0</span>
      </button>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero-bg h-[85vh] flex items-center text-white">
    <div class="max-w-5xl mx-auto px-6 text-center">
      <h2 class="text-6xl md:text-7xl font-bold tracking-tighter mb-6">Experience the Extraordinary</h2>
      <p class="text-xl mb-10">Official Sony Premium Products</p>
      <button onclick="document.getElementById('products-section').scrollIntoView({behavior:'smooth'})" 
              class="bg-white text-black px-10 py-4 rounded-2xl font-semibold text-lg">Shop Now</button>
    </div>
  </section>

  <!-- PRODUCTS SECTION -->
  <section id="products-section" class="max-w-7xl mx-auto px-6 py-16">
    <h2 class="text-4xl font-semibold mb-12 text-center">All Products</h2>
    <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
      <!-- Populated by JavaScript -->
    </div>
  </section>

  <!-- QUICK VIEW MODAL -->
  <div id="quick-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white max-w-2xl w-full mx-4 rounded-3xl overflow-hidden">
      <div class="flex">
        <div id="modal-image" class="w-5/12 bg-zinc-100"></div>
        <div class="flex-1 p-8">
          <button onclick="closeModal()" class="float-right text-3xl text-zinc-400 hover:text-black">×</button>
          <h3 id="modal-name" class="text-2xl font-semibold mb-2"></h3>
          <p id="modal-code" class="text-zinc-500 mb-6"></p>
          <span id="modal-price" class="text-4xl font-bold block mb-8"></span>
          <button onclick="addCurrentToCart()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-semibold hover:bg-red-700">Add to Cart</button>
        </div>
      </div>
    </div>
  </div>

  <!-- CART SIDEBAR -->
  <div id="cart-sidebar" class="cart-sidebar fixed top-0 right-0 h-full w-full max-w-md bg-white shadow-2xl z-50 overflow-auto">
    <div class="p-6 border-b flex justify-between">
      <h3 class="text-2xl font-semibold">Your Cart</h3>
      <button onclick="toggleCart()" class="text-3xl">×</button>
    </div>
    <div id="cart-items" class="p-6 space-y-6"></div>
    <div class="p-6 border-t">
      <div class="flex justify-between text-xl mb-6">
        <span>Total</span>
        <span id="cart-total" class="font-bold">₹0</span>
      </div>
      <button onclick="checkout()" class="w-full bg-red-600 text-white py-4 rounded-2xl font-semibold text-lg hover:bg-red-700">Proceed to Checkout</button>
    </div>
  </div>

      {id:501, category:"Other", code:"50668452", name:"PS5 HD CAMERA", price:5190, stock:7, img:"https://picsum.photos/id/1015/600/600"},
      {id:502, category:"Other", code:"50668453", name:"PS5 HEADSET WHITE", price:8590, stock:6, img:"https://picsum.photos/id/180/600/600"},
      {id:503, category:"Other", code:"36727887", name:"XAV-AX3200/Q IN", price:24990, stock:1, img:"https://picsum.photos/id/201/600/600"},
    ];

    let cart = [];
    let currentProduct = null;

    function renderProducts(filteredProducts = products) {
      const grid = document.getElementById('product-grid');
      grid.innerHTML = '';

      filteredProducts.forEach(product => {
        const card = document.createElement('div');
        card.className = `product-card bg-white rounded-3xl overflow-hidden border cursor-pointer`;
        card.innerHTML = `
          <img src="${product.img}" class="w-full h-64 object-cover" alt="${product.name}">
          <div class="p-5">
            <p class="text-xs text-zinc-500">${product.code}</p>
            <h3 class="font-semibold text-lg leading-tight my-2">${product.name}</h3>
            <div class="flex justify-between items-end">
              <span class="text-2xl font-bold">₹${product.price.toLocaleString('en-IN')}</span>
              <button onclick="quickView(${product.id}); event.stopImmediatePropagation()" 
                      class="bg-zinc-900 hover:bg-red-600 text-white px-5 py-2 rounded-2xl text-sm">Quick View</button>
            </div>
          </div>
        `;
        card.onclick = () => quickView(product.id);
        grid.appendChild(card);
      });
    }

    function quickView(id) {
      currentProduct = products.find(p => p.id === id);
      if (!currentProduct) return;

      document.getElementById('modal-image').innerHTML = `<img src="${currentProduct.img}" class="w-full h-full object-cover">`;
      document.getElementById('modal-name').textContent = currentProduct.name;
      document.getElementById('modal-code').textContent = currentProduct.code;
      document.getElementById('modal-price').innerHTML = `₹${currentProduct.price.toLocaleString('en-IN')}`;

      document.getElementById('quick-modal').classList.remove('hidden');
      document.getElementById('quick-modal').classList.add('flex');
    }

    function closeModal() {
      document.getElementById('quick-modal').classList.add('hidden');
      document.getElementById('quick-modal').classList.remove('flex');
    }

    function addCurrentToCart() {
      if (currentProduct) addToCart(currentProduct);
      closeModal();
    }

    function addToCart(product) {
      const existing = cart.find(item => item.id === product.id);
      if (existing) existing.quantity++;
      else cart.push({...product, quantity: 1});
      updateCart();
    }

    function updateCart() {
      document.getElementById('cart-count').textContent = cart.reduce((sum, item) => sum + item.quantity, 0);

      const container = document.getElementById('cart-items');
      container.innerHTML = '';
      let total = 0;

      cart.forEach((item, index) => {
        const itemTotal = item.price * item.quantity;
        total += itemTotal;

        const div = document.createElement('div');
        div.className = "flex gap-4";
        div.innerHTML = `
          <img src="${item.img}" class="w-20 h-20 object-cover rounded-2xl">
          <div class="flex-1">
            <div class="font-medium">${item.name}</div>
            <div class="text-xs text-zinc-500">${item.code}</div>
            <div class="mt-3 flex justify-between items-center">
              <div class="flex border rounded-2xl">
                <button onclick="changeQty(${index}, -1)" class="px-3">-</button>
                <span class="px-4">${item.quantity}</span>
                <button onclick="changeQty(${index}, 1)" class="px-3">+</button>
              </div>
              <div class="text-right">
                <div class="font-bold">₹${itemTotal.toLocaleString('en-IN')}</div>
                <button onclick="removeFromCart(${index})" class="text-red-500 text-xs">Remove</button>
              </div>
            </div>
          </div>
        `;
        container.appendChild(div);
      });

      document.getElementById('cart-total').textContent = `₹${total.toLocaleString('en-IN')}`;
    }

    function changeQty(index, delta) {
      cart[index].quantity = Math.max(1, cart[index].quantity + delta);
      updateCart();
    }

    function removeFromCart(index) {
      cart.splice(index, 1);
      updateCart();
    }

    function toggleCart() {
      document.getElementById('cart-sidebar').classList.toggle('open');
    }

    function checkout() {
      if (cart.length === 0) return alert("Cart is empty!");
      alert("✅ Thank you for your order at Sony Store!\n\n(This is a demo website. Connect Razorpay for real payments.)");
    }

    function filterCategory(cat) {
      if (cat === 'all') renderProducts(products);
      else renderProducts(products.filter(p => p.category === cat));
    }

    // Initialize
    renderProducts();
  </script>
